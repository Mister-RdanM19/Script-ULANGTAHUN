<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Watercolor for n3i</title>
    <style>
        body { margin: 0; height: 100vh; background: #fff; display: flex; justify-content: center; align-items: center; font-family: 'Dancing Script', cursive; overflow: hidden; }
        .paint-splash { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,182,193,0.5) 0%, transparent 70%); border-radius: 50%; filter: blur(50px); z-index: 1; }
        .text-content { z-index: 10; text-align: center; color: #444; }
        h1 { font-size: 3.5rem; color: #d63384; margin: 0; }
        p { font-size: 1.3rem; margin-top: 20px; font-style: italic; }
        footer { position: absolute; bottom: 30px; font-family: sans-serif; font-size: 10px; color: #999; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="paint-splash"></div>
    <div class="text-content">
        <h1>n3i</h1>
        <p>"Hidupku lebih berwarna sejak adanya kamu.<br>Selamat ulang tahun, pelukis hatiku."</p>
    </div>
    <footer>MR.RM19 | ramdan19id@gmail.com</footer>
</body>
</html>
