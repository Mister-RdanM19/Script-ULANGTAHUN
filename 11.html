<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Moonlight for n3i</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(to bottom, #000428, #004e92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #f0f0f0;
            font-family: 'Palatino', 'URW Palladio L', serif;
            overflow: hidden;
            text-align: center;
        }

        .moon {
            width: 100px;
            height: 100px;
            background: #fffdef;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 253, 239, 0.8);
            margin-bottom: 20px;
        }

        .reflection {
            width: 2px;
            height: 150px;
            background: linear-gradient(to bottom, rgba(255,253,239,0.5), transparent);
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .poem {
            font-style: italic;
            line-height: 1.8;
            max-width: 500px;
            padding: 0 20px;
            color: #ccc;
        }

        .footer {
            margin-top: 60px;
            font-size: 11px;
            letter-spacing: 2px;
            opacity: 0.4;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="moon"></div>
    <div class="reflection"></div>

    <h1>Happy Birthday, n3i</h1>
    <p class="poem">
        "Selembut cahaya rembulan yang jatuh ke permukaan samudera,<br>
        begitulah doa-doaku mengalir untukmu malam ini.<br>
        Selamat ulang tahun, pencuri hatiku."
    </p>

    <div class="footer">
        Written by Mr.Rm19 | ramdan19id@gmail.com
    </div>

</body>
</html>
