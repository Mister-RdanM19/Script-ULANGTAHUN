<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Binary Heart for n3i</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #ff3366;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .overlay {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: rgba(0,0,0,0.4);
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 0 0 20px #ff3366;
            margin: 0;
        }

        .info {
            color: #fff;
            background: #ff3366;
            padding: 5px 15px;
            margin-top: 20px;
            font-weight: bold;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="overlay">
        <h1>HAPPY BIRTHDAY n3i</h1>
        <div class="info">DECODING LOVE... SUCCESS!</div>
        <p style="color: #fff; margin-top: 20px;">"Kamu adalah satu-satunya 'logic' yang<br>membuat hidupku menjadi sempurna."</p>
        
        <div class="footer">
            [Writer: Mr.Rm19] - [ramdan19id@gmail.com]
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "n3iLOVE1010HBDMRRM19";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) drops[i] = 1;

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff3366";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
