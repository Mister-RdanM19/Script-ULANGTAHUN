<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Infinity n3i</title>
    <style>
        body { margin: 0; height: 100vh; background: #050505; display: flex; justify-content: center; align-items: center; color: white; font-family: 'Verdana', sans-serif; overflow: hidden; }
        .infinity-box { text-align: center; position: relative; }
        .symbol { font-size: 8rem; color: #ff0055; text-shadow: 0 0 30px #ff0055; animation: breath 3s infinite ease-in-out; }
        h1 { font-weight: 100; letter-spacing: 5px; margin-top: -20px; }
        p { color: #555; font-size: 0.9rem; margin-top: 20px; }
        @keyframes breath { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        .footer { margin-top: 50px; font-size: 10px; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="infinity-box">
        <div class="symbol">∞</div>
        <h1>n3i</h1>
        <p>"Cintaku padamu adalah sebuah iterasi tanpa batas."</p>
        <div class="footer">BY MR.RM19 - ramdan19id@gmail.com</div>
    </div>
</body>
</html>
