<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>n3i - The End?</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #000;
            color: #fff;
            font-family: 'Times New Roman', Times, serif; /* Font klasik film */
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .crawl-container {
            width: 80%;
            max-width: 700px;
            text-align: center;
            position: absolute;
            bottom: -100%; /* Mulai dari luar layar bawah */
            animation: crawl 20s linear forwards;
        }

        @keyframes crawl {
            0% { bottom: -100%; }
            100% { bottom: 100%; } /* Berakhir di luar layar atas */
        }

        .title {
            font-size: 3.5rem;
            letter-spacing: 10px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .message {
            font-size: 1.5rem;
            line-height: 2;
            font-style: italic;
            margin-bottom: 100px;
        }

        .credits {
            margin-top: 50px;
            font-size: 1rem;
            color: #aaa;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .the-end {
            font-size: 4rem;
            margin-top: 50px;
            font-family: 'Georgia', serif;
        }
    </style>
</head>
<body>

    <div class="crawl-container">
        <div class="title">Untuk n3i</div>
        
        <p class="message">
            Kisah kita baru saja dimulai...<br><br>
            Setiap tahun yang berganti<br>
            Hanya menegaskan betapa berartinya dirimu.<br><br>
            Selamat ulang tahun,<br>
            Sosok yang melengkapi detak jantungku.<br><br>
            Semoga kebahagiaan ini bertahan selamanya.<br>
            Tanpa akhir.
        </p>

        <div class="the-end">Tamat?</div>

        <div class="credits">
            A PRODUCTION BY:<br>
            <strong>Mr.Rm19</strong><br><br>
            CONTACT:<br>
            ramdan19id@gmail.com
        </div>
    </div>

</body>
</html>
