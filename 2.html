<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD n3i - Option 2</title>
    <style>
        body {
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f0f 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { color: #ccc; margin-top: 15px; }

        .sender {
            margin-top: 30px;
            font-size: 0.85rem;
            opacity: 0.6;
        }

        .email-tag { color: #00ffcc; text-decoration: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Happy Birthday n3i</h1>
        <p>Semoga tahun ini membawa banyak kejutan manis untukmu.</p>
        
        <div class="sender">
            Tulus dari: <strong>Mr.Rm19</strong><br>
            <span class="email-tag">ramdan19id@gmail.com</span>
        </div>
    </div>

</body>
</html>
