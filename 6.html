<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HBD n3i - Special Edition</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px;
            position: relative;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin: 0;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #fff; }
            to { text-shadow: 0 0 20px #fff, 0 0 30px #ff00de; }
        }

        .quote {
            margin-top: 30px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #888;
            max-width: 400px;
        }

        .signature {
            position: absolute;
            bottom: -50px;
            left: 0;
            width: 100%;
            font-size: 10px;
            color: #333;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>n3i</h1>
        <p class="quote">"Setiap detik bersamamu adalah kado terindah.<br>Selamat ulang tahun, sayang."</p>
        
        <div class="signature">
            Mr.Rm19 - ramdan19id@gmail.com
        </div>
    </div>

</body>
</html>
