<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Untuk n3i - My Love</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #fff5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        .content {
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 71, 126, 0.1);
        }

        h1 { color: #ff477e; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #666; font-style: italic; font-size: 1.1rem; line-height: 1.6; }

        .heart {
            position: absolute;
            color: #ff477e;
            font-size: 20px;
            animation: moveUp 4s linear forwards;
            opacity: 0.7;
        }

        @keyframes moveUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Happy Birthday n3i</h1>
        <p>"Terima kasih telah lahir ke dunia.<br>Semoga harimu seindah senyummu yang<br>selalu menghangatkan hatiku."</p>
        
        <div class="footer">
            From: Mr.Rm19 - ramdan19id@gmail.com
        </div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
