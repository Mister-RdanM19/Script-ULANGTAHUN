<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD n3i - Option 1</title>
    <style>
        /* CSS Langsung di sini */
        body {
            background-color: #0a0a0a;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .terminal-box {
            border: 1px solid #333;
            padding: 30px;
            background: #111;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #00ffcc;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #555;
            border-top: 1px solid #222;
            padding-top: 10px;
        }

        .highlight { color: #fff; }
    </style>
</head>
<body>

    <div class="terminal-box">
        <div id="typewriter"></div>
        <span class="cursor"></span>

        <div class="footer">
            From: <span class="highlight">Mr.Rm19</span><br>
            Contact: <span class="highlight">ramdan19id@gmail.com</span>
        </div>
    </div>

    <script>
        // JS Langsung di sini
        const text = "Sistem Mendeteksi Hari Spesial...\n\nHappy Birthday kepada n3i!\nSemoga harimu luar biasa dan penuh kebahagiaan.\n\n[Status: Success]";
        const container = document.getElementById('typewriter');
        let i = 0;

        function type() {
            if (i < text.length) {
                if (text.charAt(i) === "\n") {
                    container.innerHTML += "<br>";
                } else {
                    container.innerHTML += text.charAt(i);
                }
                i++;
                setTimeout(type, 50);
            }
        }

        window.onload = type;
    </script>
</body>
</html>
