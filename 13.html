<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rose for n3i</title>
    <style>
        body {
            margin: 0; height: 100vh; overflow: hidden;
            background: radial-gradient(circle, #fff0f3 0%, #ffccd5 100%);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Palatino', serif; text-align: center;
        }
        .message-box {
            z-index: 10; background: rgba(255, 255, 255, 0.4);
            padding: 40px; border-radius: 50%; backdrop-filter: blur(5px);
            border: 2px dashed #ff4d6d;
        }
        h1 { color: #c9184a; font-size: 2.2rem; margin: 0; }
        p { color: #590d22; font-style: italic; margin-top: 15px; }
        .petal {
            position: absolute; background: #ff4d6d;
            border-radius: 150% 0 150% 0; animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        footer { position: absolute; bottom: 20px; font-size: 10px; color: #a4133c; }
    </style>
</head>
<body>
    <div class="message-box">
        <h1>HBD n3i</h1>
        <p>"Bagaikan mawar yang mekar di musim semi,<br>begitulah cintaku tumbuh setiap hari."</p>
    </div>
    <footer>FROM: MR.RM19 | ramdan19id@gmail.com</footer>
    <script>
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 15 + 10 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 5000);
        }
        setInterval(createPetal, 200);
    </script>
</body>
</html>
