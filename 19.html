<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Lanterns for n3i</title>
    <style>
        body { margin: 0; height: 100vh; background: linear-gradient(to top, #0c1445 0%, #000 100%); overflow: hidden; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; }
        .lantern { position: absolute; width: 40px; height: 55px; background: rgba(255, 165, 0, 0.8); border-radius: 5px; box-shadow: 0 0 20px #ffa500; animation: floatUp linear forwards; }
        @keyframes floatUp { 0% { transform: translateY(110vh) translateX(0); opacity: 1; } 100% { transform: translateY(-20vh) translateX(30px); opacity: 0; } }
        .msg-box { z-index: 10; text-align: center; color: #fff; text-shadow: 0 0 10px #ffa500; }
        h1 { font-size: 3rem; margin: 0; }
        p { font-style: italic; color: #ffd700; margin-top: 15px; }
        .footer { position: absolute; bottom: 20px; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="msg-box">
        <h1>Happy Birthday n3i</h1>
        <p>"Biarkan setiap lampion ini membawa<br>doa-doa terbaikku untukmu."</p>
    </div>
    <div class="footer">Mr.Rm19 - ramdan19id@gmail.com</div>
    <script>
        function createLantern() {
            const lantern = document.createElement('div');
            lantern.classList.add('lantern');
            lantern.style.left = Math.random() * 100 + 'vw';
            lantern.style.animationDuration = Math.random() * 5 + 7 + 's';
            lantern.style.opacity = Math.random();
            document.body.appendChild(lantern);
            setTimeout(() => lantern.remove(), 12000);
        }
        setInterval(createLantern, 500);
    </script>
</body>
</html>
